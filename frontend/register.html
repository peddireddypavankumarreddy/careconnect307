<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CareConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body onload="loadNavbar()">
<div id="nav"></div>
<div class="container">
    <div class="card">
        <h2>Register</h2>
        <form onsubmit="registerUser(event)">
            <input id="nameInput" placeholder="Full Name" required>
            <input id="emailInput" type="email" placeholder="Email" required>
            <input id="passwordInput" type="password" placeholder="Password" required>
            <button>Register</button>
        </form>
        <p><a href="login.html">Already have account? Login</a></p>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
