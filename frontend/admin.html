<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | CareConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body onload="checkAuth(); loadNavbar(); loadAdminStats()">
    <div id="nav"></div>
    <div class="container">
        <header style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-size: 2.5rem;">Admin Overview</h1>
        </header>

        <div class="grid">
            <div class="glass-card" style="text-align: center;">
                <i class="fas fa-users" style="font-size: 40px; color: #4facfe; margin-bottom: 10px;"></i>
                <h3>Users</h3>
                <div id="users" style="font-size: 30px; font-weight: bold;">0</div>
            </div>
            <div class="glass-card" style="text-align: center;">
                <i class="fas fa-hand-holding-heart" style="font-size: 40px; color: #ff4b2b; margin-bottom: 10px;"></i>
                <h3>Requests</h3>
                <div id="requests" style="font-size: 30px; font-weight: bold;">0</div>
            </div>
            <div class="glass-card" style="text-align: center;">
                <i class="fas fa-bowl-food" style="font-size: 40px; color: #43e97b; margin-bottom: 10px;"></i>
                <h3>Donations</h3>
                <div id="donations" style="font-size: 30px; font-weight: bold;">0</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
