<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request - CareConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body onload="loadNavbar()">
<div id="nav"></div>
<div class="container">
    <div class="card">
        <h2>Request Food</h2>
        <form onsubmit="submitRequest(event)">
            <input id="name" placeholder="Your Name" required>
            <input id="phone" type="tel" placeholder="Phone" required>
            <input id="location" placeholder="Location" required>
            <textarea id="food" placeholder="Food Needed" required></textarea>
            <button class="btn-blue">Post Request</button>
        </form>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
